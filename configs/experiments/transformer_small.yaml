# 8GB VRAM
# ~30M params

_base_: "base.yaml"

model:
  d_model: 256
  num_heads: 8    # head_dim = 256/8 = 32
  num_layers: 4
  d_ff: 512
  max_seq_length: 128
  dropout: 0.1

data:
  batch_size: 32
  max_tokens: 128
  num_workers: 4

training:
  epochs: 20
  warmup_steps: 2000
  gradient_accumulation_steps: 4    # 32 * 4 = 128

scheduler:
  warmup_steps: 2000

logging:
  log_every: 50